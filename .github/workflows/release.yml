name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist & wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Resolve version
        id: meta
        run: |
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  github-release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create / update release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          notes="Automated release for ${tag}.

          Install:
          \`\`\`
          pipx install git+https://github.com/${{ github.repository }}.git@${tag}
          \`\`\`
          Or download the wheel below and \`pipx install ./dictation-*.whl\`."
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --title "$tag" \
              --notes "$notes" \
              --verify-tag
          fi

  # Optional: publish to PyPI via Trusted Publishing.
  # Enable by setting repository variable PUBLISH_PYPI=true and configuring a
  # PyPI trusted publisher for this repo/workflow. No API token needed.
  pypi-publish:
    name: Publish to PyPI
    needs: build
    if: ${{ vars.PUBLISH_PYPI == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
