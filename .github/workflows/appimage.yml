name: AppImage

on:
  pull_request:
    paths:
      - "dictux/**"
      - "packaging/appimage/**"
      - "packaging/build-appimage.sh"
      - "pyproject.toml"
      - ".github/workflows/appimage.yml"
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appimage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build AppImage
    # Build on an older base for broader glibc compatibility.
    runs-on: ubuntu-22.04
    env:
      # Let bundled appimagetool run without a FUSE mount on CI.
      APPIMAGE_EXTRACT_AND_RUN: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librsvg2-bin
          python -m pip install --upgrade pip build python-appimage

      - name: Build AppImage
        run: bash packaging/build-appimage.sh

      - name: Smoke test (no display needed)
        run: |
          APP=$(ls dist/*.AppImage | head -1)
          chmod +x "$APP"
          echo "Built: $APP"
          "$APP" --appimage-extract-and-run --version
          "$APP" --appimage-extract-and-run --status

      - name: Rename artifact
        id: art
        run: |
          APP=$(ls dist/*.AppImage | head -1)
          NEW="dist/Dictux-x86_64.AppImage"
          mv "$APP" "$NEW"
          echo "path=$NEW" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: Dictux-x86_64.AppImage
          path: ${{ steps.art.outputs.path }}

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release upload "$tag" "${{ steps.art.outputs.path }}" --clobber
